<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B0B10">
<title>Shared Chat — TrueCatholic AI</title>
<meta name="description" content="A shared conversation from TrueCatholic AI — Catholic AI that teaches the faith without apology.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23C4A24E'/%3E%3Crect x='46' y='22' width='8' height='56' rx='2' fill='%230B0B10'/%3E%3Crect x='26' y='38' width='48' height='8' rx='2' fill='%230B0B10'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=IBM+Plex+Mono:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C4A24E; --gold-light: #DABE6A; --gold-dim: #907636; --gold-faint: #6B5828;
    --bg: #0B0B10; --bg-el: #111117; --bg-card: #16161E; --bg-input: #1A1A24;
    --text: #E4E0D8; --text-mid: #A8A39B; --text-dim: #6B6760;
    --border: rgba(196,162,78,0.1); --border-strong: rgba(196,162,78,0.2);
    --ai-bg: rgba(17,17,23,0.6); --radius: 12px;
  }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse at 50% 0%, rgba(196,162,78,0.03) 0%, transparent 70%);
  }

  .header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(11,11,16,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 10px;
  }
  .header-mark {
    width: 26px; height: 26px; border-radius: 50%; background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    position: relative; flex-shrink: 0;
  }
  .header-mark::before { content: ''; position: absolute; width: 10px; height: 2px; background: var(--bg); }
  .header-mark::after { content: ''; position: absolute; width: 2px; height: 10px; background: var(--bg); }
  .header-title {
    font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 500;
    color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .header-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px;
    white-space: nowrap; margin-left: auto;
  }

  .messages { max-width: 100%; padding-bottom: 40px; }
  .message { padding: 12px 20px; max-width: 800px; margin: 0 auto; }
  .message.ai { background: var(--ai-bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .msg-avatar {
    width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; font-weight: 500; flex-shrink: 0;
  }
  .msg-avatar.ai { background: var(--gold); color: var(--bg); position: relative; }
  .msg-avatar.ai::before { content: ''; position: absolute; width: 8px; height: 1.5px; background: var(--bg); }
  .msg-avatar.ai::after { content: ''; position: absolute; width: 1.5px; height: 8px; background: var(--bg); }
  .msg-avatar.user { background: var(--border-strong); color: var(--text-mid); }
  .msg-name {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .ai-name { color: var(--gold); }
  .user-name { color: var(--text-dim); }
  .msg-body { font-size: 0.95rem; line-height: 1.7; color: var(--text); }
  .msg-body p { margin-bottom: 12px; }
  .msg-body p:last-child { margin-bottom: 0; }
  .msg-body strong { color: var(--gold-light); font-weight: 500; }
  .msg-body em { font-style: italic; color: var(--text-mid); }
  .msg-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; opacity: 0.5; }
  .msg-body .list-subhead { margin: 8px 0 2px; }
  .msg-body blockquote {
    border-left: 2px solid var(--gold-dim); padding-left: 16px; margin: 12px 0;
    color: var(--text-mid); font-style: italic;
  }
  .msg-body ul, .msg-body ol { margin: 8px 0 12px 20px; }
  .msg-body li { margin-bottom: 4px; line-height: 1.6; }

  .footer {
    max-width: 800px; margin: 0 auto; padding: 24px 20px;
    border-top: 1px solid var(--border); text-align: center;
  }
  .footer-text {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
    color: var(--text-dim); letter-spacing: 0.04em; margin-bottom: 12px;
  }
  .footer-cta {
    display: inline-block; padding: 10px 24px; border-radius: 8px;
    background: var(--gold); color: var(--bg); text-decoration: none;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.04em; transition: opacity 0.2s;
  }
  .footer-cta:hover { opacity: 0.85; }

  .error-state, .loading-state {
    display: flex; align-items: center; justify-content: center; min-height: 60vh;
    flex-direction: column; gap: 16px; padding: 20px;
  }
  .error-state h2 {
    font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--text);
  }
  .error-state p { color: var(--text-mid); font-size: 0.9rem; text-align: center; max-width: 400px; }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--gold-dim);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  @media (max-width: 600px) {
    .message { padding: 12px 14px; }
    .header { padding: 10px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-mark"></div>
  <div class="header-title" id="chatTitle">Shared Chat</div>
  <div class="header-badge">Shared Chat</div>
</div>

<div id="loading" class="loading-state">
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<div id="error" class="error-state" style="display:none;"></div>

<div id="messages" class="messages" style="display:none;"></div>

<div id="footer" class="footer" style="display:none;">
  <div class="footer-text">This conversation was shared from TrueCatholic AI</div>
  <a href="/app.html" class="footer-cta">Try TrueCatholic AI</a>
</div>

<script>
var API_BASE = 'https://api.truecatholicai.org';

function escapeHTML(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderMarkdown(text) {
  var html = escapeHTML(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');
  html = html.replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>');
  html = html.replace(/^(---|___|\*\*\*)$/gm, '<hr>');
  html = html.replace(/(^[\-\*] .+)\n\n+(?=[\-\*] )/gm, '$1\n');
  html = html.replace(/(^\d+\. .+)\n\n+(?=\d+\. )/gm, '$1\n');
  var paragraphs = html.split(/\n\n+/);
  html = paragraphs.map(function(p) {
    p = p.trim(); if (!p) return '';
    if (p === '<hr>') return '<hr>';
    if (p.startsWith('<blockquote>')) return p;
    if (p.match(/^[\-\*] /m)) {
      var items = p.split(/\n/).filter(function(l) { return l.trim(); });
      return '<ul>' + items.map(function(l) {
        var content = l.replace(/^[\-\*] /, '');
        if (/^<strong>[^<]+<\/strong>:?$/.test(content.trim())) return '</ul><p class="list-subhead">' + content + '</p><ul>';
        return '<li>' + content + '</li>';
      }).join('') + '</ul>';
    }
    if (p.match(/^\d+\. /m)) {
      var items = p.split(/\n/).filter(function(l) { return l.trim(); });
      var result = ''; var counter = 1;
      items.forEach(function(l) {
        var content = l.replace(/^\d+\. /, '');
        if (/^<strong>[^<]+<\/strong>:?$/.test(content.trim())) {
          result += '<p class="list-subhead">' + content + '</p>';
          counter = 1;
        } else {
          result += '<ol start="' + counter + '"><li>' + content + '</li></ol>';
          counter++;
        }
      });
      return result;
    }
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  html = html.replace(/<ul>\s*<\/ul>/g, '');
  return html;
}

function renderMessage(role, content) {
  var container = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'message ' + role;
  if (role === 'ai') {
    div.innerHTML = '<div class="msg-header"><div class="msg-avatar ai"></div><span class="msg-name ai-name">TrueCatholic AI</span></div><div class="msg-body">' + renderMarkdown(content) + '</div>';
  } else {
    div.innerHTML = '<div class="msg-header"><div class="msg-avatar user">U</div><span class="msg-name user-name">User</span></div><div class="msg-body">' + renderMarkdown(content) + '</div>';
  }
  container.appendChild(div);
}

function showError(title, message) {
  document.getElementById('loading').style.display = 'none';
  var el = document.getElementById('error');
  el.innerHTML = '<h2>' + escapeHTML(title) + '</h2><p>' + escapeHTML(message) + '</p><a href="/app.html" class="footer-cta" style="margin-top:12px;">Try TrueCatholic AI</a>';
  el.style.display = 'flex';
}

async function loadSharedChat() {
  var params = new URLSearchParams(window.location.search);
  var shareId = params.get('id');
  if (!shareId) {
    showError('No chat specified', 'This link is missing the shared chat ID.');
    return;
  }

  try {
    var res = await fetch(API_BASE + '/shared/' + encodeURIComponent(shareId));
    if (res.status === 410) {
      showError('Chat expired', 'This shared conversation link has expired.');
      return;
    }
    if (res.status === 404) {
      showError('Chat not found', 'This shared conversation could not be found. It may have been removed by the person who shared it.');
      return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();

    document.getElementById('chatTitle').textContent = data.title || 'Shared Chat';
    document.title = (data.title || 'Shared Chat') + ' — TrueCatholic AI';

    var msgs = data.messages || [];
    for (var i = 0; i < msgs.length; i++) {
      var m = msgs[i];
      var role = (m.role === 'assistant') ? 'ai' : 'user';
      renderMessage(role, m.content);
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('messages').style.display = 'block';
    document.getElementById('footer').style.display = 'block';
  } catch (e) {
    showError('Unable to load chat', 'Something went wrong loading this conversation. Please try again later.');
  }
}

loadSharedChat();
</script>
</body>
</html>
